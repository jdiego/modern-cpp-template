name: Ubuntu

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  INSTALL_LOCATION: ${{ github.workspace }}/.local
  BUILD_TYPE: Release
  CTEST_OUTPUT_ON_FAILURE: 1
  PROJECT_NAME: MODERN_CPP_PROJECT
  CPM_SOURCE_CACHE: ${{ github.workspace }}/cpm_modules

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: "**/cpm_modules"
          key: ${{ github.workflow }}-cpm-modules-${{ hashFiles('**/CMakeLists.txt', '**/*.cmake') }}

      - name: Install GCC 14
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-14 g++-14

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=$BUILD_TYPE \
            -DCMAKE_C_COMPILER=gcc-14 \
            -DCMAKE_CXX_COMPILER=g++-14 \
            -DCMAKE_INSTALL_PREFIX=$INSTALL_LOCATION \
            -D${PROJECT_NAME}_ENABLE_TESTING=ON \
            -D${PROJECT_NAME}_ENABLE_STANDALONE=ON \
            -D${PROJECT_NAME}_ENABLE_CODE_COVERAGE=ON

      - name: Build
        run: cmake --build build --config $BUILD_TYPE -j$(nproc)

      - name: Test
        run: ctest --test-dir build -C $BUILD_TYPE --output-on-failure

      - name: Install
        run: cmake --build build --target install --config $BUILD_TYPE

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
